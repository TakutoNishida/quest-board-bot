name: 🌅 Morning Delivery

# 毎日 朝の指定時刻に実行
# UTC基準なのでJST7:30は前日UTC22:30
on:
  schedule:
    # cron: 分 時 日 月 曜日 (UTC)
    # JST 07:30 = UTC 22:30 (前日)
    - cron: '30 22 * * *'
  workflow_dispatch:  # 手動実行も可能

jobs:
  deliver:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Send morning delivery
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          PLAYER_NAME: ${{ vars.PLAYER_NAME || 'あなた' }}
          TIMEZONE: ${{ vars.TIMEZONE || 'Asia/Tokyo' }}
          USER_CONFIG_JSON: ${{ secrets.USER_CONFIG_JSON }}
        run: python deliver.py morning
